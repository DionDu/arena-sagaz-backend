<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimax Interativo - Passo a Passo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #11111b; color: #cdd6f4; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        #app { display: flex; height: 100vh; width: 100vw; }
        #sidebar { width: 380px; background: #181825; padding: 25px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); z-index: 10; display: flex; flex-direction: column; border-right: 1px solid #313244; }
        #tree-view { flex: 1; overflow: auto; position: relative; padding: 40px; background: #1e1e2e; scroll-behavior: smooth; }
        h2 { color: #89b4fa; margin-top: 0; border-bottom: 2px solid #313244; padding-bottom: 10px; }
        #step-text { font-size: 15px; line-height: 1.6; margin-bottom: 20px; color: #bac2de; }
        #step-text b { color: #cdd6f4; }
        #math-box { background: #11111b; padding: 15px; border-radius: 8px; border-left: 4px solid #a6e3a1; font-family: 'Courier New', Courier, monospace; font-size: 15px; margin-bottom: 20px; color: #a6e3a1; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .controls { display: flex; gap: 10px; margin-top: auto; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; transition: all 0.2s; }
        #btn-prev { background: #313244; color: #cdd6f4; flex: 1; }
        #btn-prev:hover:not(:disabled) { background: #45475a; }
        #btn-prev:disabled { opacity: 0.5; cursor: not-allowed; }
        #btn-next { background: #89b4fa; color: #11111b; flex: 2; box-shadow: 0 4px 10px rgba(137, 180, 250, 0.3); }
        #btn-next:hover:not(:disabled) { background: #b4befe; transform: translateY(-2px); }
        #btn-next:active:not(:disabled) { transform: translateY(0); }
        #btn-next:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; }
        .progress { text-align: center; margin-top: 15px; font-size: 12px; color: #6c7086; font-weight: bold; }
        
        .insight-box {
            background: rgba(249, 226, 175, 0.08);
            border-left: 4px solid #f9e2af;
            padding: 12px;
            border-radius: 4px;
            margin-top: 15px;
            font-size: 13.5px;
            color: #f9e2af;
            line-height: 1.5;
        }
        .insight-box b { color: #f9e2af !important; }

        .tree { display: flex; flex-direction: column; align-items: center; }
        .level { display: flex; justify-content: center; gap: 50px; margin-top: 70px; position: relative; }
        .node-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; }
        .node { background-color: #313244; border: 2px solid #45475a; border-radius: 10px; padding: 12px; display: flex; flex-direction: column; align-items: center; min-width: 140px; opacity: 0; visibility: hidden; transform: translateY(-20px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .node.revealed { opacity: 1; visibility: visible; transform: translateY(0); }
        .node.highlighted { border-color: #f9e2af; box-shadow: 0 0 25px rgba(249, 226, 175, 0.4); transform: scale(1.08); z-index: 10; }
        .turn-badge { font-size: 10px; text-transform: uppercase; font-weight: bold; padding: 4px 10px; border-radius: 12px; margin-bottom: 10px; letter-spacing: 1px; }
        .turn-max { background-color: #89b4fa; color: #11111b; }
        .turn-min { background-color: #f38ba8; color: #11111b; }
        .board { width: 80px; height: 40px; position: relative; margin-bottom: 15px; }
        .dot { width: 6px; height: 6px; background-color: #cdd6f4; border-radius: 50%; position: absolute; z-index: 5; }
        .edge { position: absolute; background-color: #45475a; transition: background-color 0.3s; border-radius: 2px; }
        .edge.filled { background-color: #a6e3a1; }
        .edge.highlight-edge { background-color: #f9e2af !important; box-shadow: 0 0 8px #f9e2af; z-index: 6; }
        .dot:nth-child(1) { top: 0; left: 0; } .dot:nth-child(2) { top: 0; left: 37px; } .dot:nth-child(3) { top: 0; left: 74px; }
        .dot:nth-child(4) { top: 34px; left: 0; } .dot:nth-child(5) { top: 34px; left: 37px; } .dot:nth-child(6) { top: 34px; left: 74px; }
        .edge-0 { top: 2px; left: 6px; width: 31px; height: 2px; } .edge-1 { top: 2px; left: 43px; width: 31px; height: 2px; }
        .edge-2 { top: 36px; left: 6px; width: 31px; height: 2px; } .edge-3 { top: 36px; left: 43px; width: 31px; height: 2px; }
        .edge-4 { top: 6px; left: 2px; width: 2px; height: 28px; } .edge-5 { top: 6px; left: 39px; width: 2px; height: 28px; }
        .edge-6 { top: 6px; left: 76px; width: 2px; height: 28px; }
        .box-label { position: absolute; font-size: 16px; font-weight: bold; display: flex; justify-content: center; align-items: center; width: 31px; height: 28px; top: 6px; z-index: 4; }
        .box-label.p1 { color: #89b4fa; } .box-label.p2 { color: #f38ba8; }
        .box-0 { left: 6px; } .box-1 { left: 43px; }
        .val-score { font-size: 14px; font-weight: bold; color: #6c7086; background: #181825; padding: 4px 12px; border-radius: 6px; border: 1px solid #313244; width: 100%; text-align: center; box-sizing: border-box; transition: all 0.3s; }
        .val-score.final { color: #a6e3a1; border-color: #a6e3a1; background: rgba(166, 227, 161, 0.1); }
        svg.connections { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        path.link { fill: none; stroke: #45475a; stroke-width: 2px; opacity: 0; transition: opacity 0.4s; }
        path.link.revealed { opacity: 1; }
        .move-label { background-color: #181825; border: 1px solid #45475a; color: #a6adc8; font-size: 11px; padding: 2px 8px; border-radius: 12px; position: absolute; transform: translate(-50%, -50%); z-index: 3; font-weight: bold; opacity: 0; transition: opacity 0.4s; }
        .move-label.revealed { opacity: 1; }
    </style>
</head>
<body>
    <div id="app">
        <div id="sidebar">
            <h2>Simulador Minimax</h2>
            <div style="flex: 1; overflow-y: auto; padding-right: 5px;" id="narrative-container">
                <div id="step-text">Pressione <b>Avançar Passo</b> para iniciar a animação e entender como a árvore de decisão e as pontuações são construídas.</div>
                <div id="math-box" style="display: none;"></div>
            </div>
            <div class="controls">
                <button id="btn-prev" disabled>Anterior</button>
                <button id="btn-next">Avançar Passo</button>
            </div>
            <div class="progress">Passo <span id="step-counter">0</span> / <span id="total-steps">0</span></div>
        </div>
        <div id="tree-view">
            <div id="tree-root" class="tree"></div>
            <svg id="lines-svg" class="connections"></svg>
            <div id="labels-container"></div>
        </div>
    </div>

    <script>
        const EDGES_COUNT = 7;
        const BOXES = [[0, 2, 4, 5], [1, 3, 5, 6]];
        const EDGE_NAMES = ["T1", "T2", "B1", "B2", "L1", "M", "R2"];
        const INITIAL_EDGES = [true, true, true, false, true, false, false];
        const INITIAL_BOX_OWNERS = [0, 0];

        let stepHistory = [];
        let nodeCounter = 0;
        let linkLines = [];

        function addStep(nodeId, action, text, options = {}) {
            stepHistory.push({ nodeId, action, text, ...options });
        }

        function getClosures(edgesState, move) {
            let newEdges = [...edgesState];
            newEdges[move] = true;
            let closures = [];
            for (let i = 0; i < BOXES.length; i++) {
                let box = BOXES[i];
                if (!box.every(e => edgesState[e]) && box.every(e => newEdges[e])) closures.push(i);
            }
            return closures;
        }

        function buildTreeAndRecord(edges, depth, alpha, beta, isMax, boxOwners, moveThatGotHere = null, closuresInMove = 0, parentId = null) {
            let node = {
                id: 'n' + (nodeCounter++),
                edges: [...edges],
                isMax: isMax,
                boxOwners: [...boxOwners],
                children: []
            };

            let player = isMax ? '<span style="color:#89b4fa;">Max (Azul)</span>' : '<span style="color:#f38ba8;">Min (Vermelho)</span>';

            if (parentId === null) {
                addStep(node.id, 'VISIT_NODE', `<b>Início da Árvore</b><br><br>Iniciando a simulação a partir do estado atual. É a vez do ${player} jogar.<br><br>O objetivo do Max é maximizar o placar. O objetivo do Min é minimizar.`, { revealNode: node.id });
            } else {
                let edgeName = EDGE_NAMES[moveThatGotHere];
                let turnText = isMax ? 'A vez passou para o Max.' : 'A vez passou para o Min.';
                if (closuresInMove > 0) turnText = `${isMax ? 'Max' : 'Min'} fechou caixa(s) e ganhou o direito de jogar novamente!`;
                
                addStep(node.id, 'VISIT_NODE', `<b>Novo Estado Atingido</b><br><br>Este é o tabuleiro após a jogada em <b>${edgeName}</b>.<br>${turnText}`, { 
                    revealNode: node.id, 
                    revealLink: `${parentId}-${node.id}`
                });
                linkLines.push({ parentId, childId: node.id, moveName: edgeName });
            }

            if (edges.every(e => e === true) || depth === 0) {
                node.score = 0;
                addStep(node.id, 'RETURN_SCORE', `<b>Fim de Jogo neste Ramo!</b><br><br>Não há mais jogadas possíveis. O jogo acabou nesta linha do tempo. Este nó não gera mais pontos a partir daqui (Score do futuro = 0).`, { updateScore: 0 });
                return node;
            }

            let availableMoves = [];
            for (let i = 0; i < EDGES_COUNT; i++) if (!edges[i]) availableMoves.push(i);

            let bestScore = isMax ? -1000 : 1000;

            for (let i = 0; i < availableMoves.length; i++) {
                let move = availableMoves[i];
                let closedBoxes = getClosures(edges, move);
                let cl = closedBoxes.length;
                
                let nextEdges = [...edges]; nextEdges[move] = true;
                let nextBoxOwners = [...boxOwners];
                closedBoxes.forEach(b => nextBoxOwners[b] = isMax ? 1 : 2);

                addStep(node.id, 'TRY_MOVE', `<b>Simulando Possibilidade</b><br><br>${player} pensa: "O que acontece se eu jogar na aresta <b>${EDGE_NAMES[move]}</b>?"...`, { highlightMove: move });

                let childNode;
                let val;

                if (isMax) {
                    if (cl > 0) {
                        childNode = buildTreeAndRecord(nextEdges, depth - 1, alpha - cl, beta - cl, true, nextBoxOwners, move, cl, node.id);
                        val = cl + childNode.score;
                        
                        let insight = `<div class="insight-box"><b>💡 Por que o nó futuro tem Score ${childNode.score} e não ${val}?</b><br>O Score de um nó no Minimax <b>nunca é o placar acumulado</b>, ele é apenas uma previsão do <b>futuro</b> a partir dali.<br><br>Os <b>${cl}</b> ponto(s) ganhos pelo Max acontecem <i>durante a transição</i> da jogada. Somando o ganho de agora (${cl}) com o saldo do futuro (${childNode.score}), descobrimos o impacto total dessa linha do tempo: <b>${val}</b>!</div>`;
                        
                        addStep(node.id, 'EVAL_CHILD', `<b>Cálculo de Pontos (Max)</b><br><br>Ao jogar <b>${EDGE_NAMES[move]}</b>, Max fechou <b>${cl} caixa(s)</b>.<br><br>O Score final é o que ele ganhou agora (cl) somado ao que ele garantiu no futuro (child).${insight}`, { math: `Eq: Score = cl + child<br>Eq: Score = ${cl} + (${childNode.score})<br><br><b>Resultado = ${val}</b>` });
                    } else {
                        childNode = buildTreeAndRecord(nextEdges, depth - 1, alpha, beta, false, nextBoxOwners, move, 0, node.id);
                        val = childNode.score;
                        addStep(node.id, 'EVAL_CHILD', `<b>Cálculo de Pontos (Max)</b><br><br>A jogada <b>${EDGE_NAMES[move]}</b> não fechou caixas. Max não ganhou pontos nesta rodada.<br><br>O score final depende apenas do que acontecerá no futuro (child).`, { math: `Eq: Score = 0 + child<br>Eq: Score = 0 + (${val})<br><br><b>Resultado = ${val}</b>` });
                    }
                    if (val > bestScore) bestScore = val;
                    alpha = Math.max(alpha, bestScore);
                } else {
                    if (cl > 0) {
                        childNode = buildTreeAndRecord(nextEdges, depth - 1, alpha + cl, beta + cl, false, nextBoxOwners, move, cl, node.id);
                        val = -cl + childNode.score;
                        
                        let insight = `<div class="insight-box"><b>💡 Por que o nó futuro tem Score ${childNode.score} e não ${val}?</b><br>O Score de um nó no Minimax <b>nunca é o placar acumulado</b>, ele é apenas uma previsão do <b>futuro</b> a partir dali.<br><br>A caixa fechada agora pelo Min custou <b>${-cl}</b> ponto(s) ao Max <i>durante a transição</i>. Somando a perda de agora (${-cl}) com o saldo do futuro (${childNode.score}), descobrimos o estrago total que o Min fará nessa linha do tempo: <b>${val}</b>!</div>`;
                        
                        addStep(node.id, 'EVAL_CHILD', `<b>Cálculo de Pontos (Min)</b><br><br>Ao jogar <b>${EDGE_NAMES[move]}</b>, Min (Adversário) fechou <b>${cl} caixa(s)</b>.<br><br>Lembre-se: O Score é sempre a vantagem do Max. Pontos do adversário são <b>negativos</b>.${insight}`, { math: `Eq: Score = -cl + child<br>Eq: Score = -${cl} + (${childNode.score})<br><br><b>Resultado = ${val}</b>` });
                    } else {
                        childNode = buildTreeAndRecord(nextEdges, depth - 1, alpha, beta, true, nextBoxOwners, move, 0, node.id);
                        val = childNode.score;
                        addStep(node.id, 'EVAL_CHILD', `<b>Cálculo de Pontos (Min)</b><br><br>A jogada <b>${EDGE_NAMES[move]}</b> não fechou caixas. O adversário não pontuou.<br><br>O score final depende apenas do que acontecerá no futuro (child).`, { math: `Eq: Score = 0 + child<br>Eq: Score = 0 + (${val})<br><br><b>Resultado = ${val}</b>` });
                    }
                    if (val < bestScore) bestScore = val;
                    beta = Math.min(beta, bestScore);
                }

                node.children.push(childNode);

                if (beta <= alpha) {
                    addStep(node.id, 'PRUNE', `<b>Poda Alpha-Beta (Pruning) ✂️</b><br><br>O Minimax percebeu que este caminho é pior do que uma alternativa que ele já conhece. O jogador não escolheria seguir por aqui.<br><br>Para economizar processamento, as opções restantes foram descartadas!`);
                    break;
                }
            }

            node.score = bestScore;
            addStep(node.id, 'RETURN_SCORE', `<b>Decisão Final do Nó</b><br><br>Todas as opções foram avaliadas.<br>O melhor cenário possível a partir deste ponto resulta em um Score de <b>${bestScore}</b>.<br><br>Este valor é retornado para a etapa anterior da árvore.`, { updateScore: bestScore });

            return node;
        }

        function createBoardHTML(node) {
            let html = '<div class="board">';
            for(let i=0; i<6; i++) html += '<div class="dot"></div>';
            for(let i=0; i<EDGES_COUNT; i++) {
                let classes = `edge edge-${i}`;
                if (node.edges[i]) classes += ' filled';
                html += `<div class="${classes}"></div>`;
            }
            for(let i=0; i<2; i++) {
                let owner = node.boxOwners[i];
                if (owner === 1) html += `<div class="box-label box-${i} p1">1</div>`;
                if (owner === 2) html += `<div class="box-label box-${i} p2">2</div>`;
            }
            html += '</div>';
            return html;
        }

        function renderNodeTree(node) {
            let badgeClass = node.isMax ? 'turn-max' : 'turn-min';
            let badgeText = node.isMax ? 'Vez do Max' : 'Vez do Min';
            if (node.children.length === 0) badgeText = 'Fim (Folha)';

            let html = `
                <div class="node-wrapper" id="wrapper-${node.id}">
                    <div class="node" id="node-${node.id}">
                        <div class="turn-badge ${badgeClass}">${badgeText}</div>
                        ${createBoardHTML(node)}
                        <div class="val-score" id="score-${node.id}">Score: ?</div>
                    </div>
                    ${node.children.length > 0 ? `
                        <div class="level" id="children-${node.id}">
                            ${node.children.map(renderNodeTree).join('')}
                        </div>
                    ` : ''}
                </div>
            `;
            return html;
        }

        function drawLinesDOM() {
            const container = document.getElementById('tree-view');
            const svg = document.getElementById('lines-svg');
            const labelsContainer = document.getElementById('labels-container');
            
            svg.innerHTML = ''; labelsContainer.innerHTML = '';
            const containerRect = container.getBoundingClientRect();

            linkLines.forEach(link => {
                const parentEl = document.getElementById(`node-${link.parentId}`);
                const childEl = document.getElementById(`node-${link.childId}`);
                if (!parentEl || !childEl) return;

                const pRect = parentEl.getBoundingClientRect();
                const cRect = childEl.getBoundingClientRect();

                const startX = pRect.left + pRect.width / 2 - containerRect.left + container.scrollLeft;
                const startY = pRect.bottom - containerRect.top + container.scrollTop;
                const endX = cRect.left + cRect.width / 2 - containerRect.left + container.scrollLeft;
                const endY = cRect.top - containerRect.top + container.scrollTop;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('class', 'link');
                path.id = `link-${link.parentId}-${link.childId}`;
                path.setAttribute('d', `M ${startX} ${startY} C ${startX} ${(startY+endY)/2}, ${endX} ${(startY+endY)/2}, ${endX} ${endY}`);
                svg.appendChild(path);

                const label = document.createElement('div');
                label.className = 'move-label';
                label.id = `label-${link.parentId}-${link.childId}`;
                label.style.left = `${(startX + endX) / 2}px`;
                label.style.top = `${(startY + endY) / 2}px`;
                label.innerText = link.moveName;
                labelsContainer.appendChild(label);
            });
        }

        let currentIndex = -1;

        function applyState(targetIndex) {
            document.querySelectorAll('.node').forEach(n => n.classList.remove('highlighted'));
            document.querySelectorAll('.edge').forEach(e => e.classList.remove('highlight-edge'));
            
            document.querySelectorAll('.node, .link, .move-label').forEach(e => e.classList.remove('revealed'));
            document.querySelectorAll('.val-score').forEach(s => { s.innerText = 'Score: ?'; s.classList.remove('final'); });

            if (targetIndex < 0) {
                document.getElementById('step-text').innerHTML = "Pressione <b>Avançar Passo</b> para iniciar a animação.";
                document.getElementById('math-box').style.display = 'none';
                document.getElementById('btn-prev').disabled = true;
                return;
            }

            let currentStep = stepHistory[targetIndex];

            for (let i = 0; i <= targetIndex; i++) {
                let step = stepHistory[i];
                if (step.revealNode) document.getElementById(`node-${step.revealNode}`).classList.add('revealed');
                if (step.revealLink) {
                    document.getElementById(`link-${step.revealLink}`).classList.add('revealed');
                    document.getElementById(`label-${step.revealLink}`).classList.add('revealed');
                }
                if (step.updateScore !== undefined) {
                    let scoreEl = document.getElementById(`score-${step.nodeId}`);
                    if (scoreEl) {
                        scoreEl.innerText = `Score: ${step.updateScore}`;
                        scoreEl.classList.add('final');
                    }
                }
            }

            if (currentStep.nodeId) {
                let nodeEl = document.getElementById(`node-${currentStep.nodeId}`);
                if (nodeEl) {
                    nodeEl.classList.add('highlighted');
                    let container = document.getElementById('tree-view');
                    let nodeRect = nodeEl.getBoundingClientRect();
                    let containerRect = container.getBoundingClientRect();
                    
                    let scrollTop = nodeEl.offsetTop - (containerRect.height / 2) + (nodeRect.height / 2);
                    let scrollLeft = nodeEl.offsetLeft - (containerRect.width / 2) + (nodeRect.width / 2);
                    
                    container.scrollTo({
                        top: Math.max(0, scrollTop - 50),
                        left: Math.max(0, scrollLeft),
                        behavior: 'smooth'
                    });
                }
            }
            if (currentStep.highlightMove !== undefined) {
                let edgeEl = document.querySelector(`#node-${currentStep.nodeId} .edge-${currentStep.highlightMove}`);
                if (edgeEl) edgeEl.classList.add('highlight-edge');
            }

            document.getElementById('step-text').innerHTML = currentStep.text;
            let mathBox = document.getElementById('math-box');
            if (currentStep.math) {
                mathBox.style.display = 'block';
                mathBox.innerHTML = currentStep.math;
            } else {
                mathBox.style.display = 'none';
            }

            document.getElementById('step-counter').innerText = targetIndex + 1;
            document.getElementById('btn-prev').disabled = false;
            document.getElementById('btn-next').innerText = targetIndex === stepHistory.length - 1 ? 'Concluído' : 'Avançar Passo';
            document.getElementById('btn-next').disabled = targetIndex === stepHistory.length - 1;
        }

        // Initialization
        let rootNodeTree = buildTreeAndRecord(INITIAL_EDGES, 10, -1000, 1000, true, INITIAL_BOX_OWNERS);
        document.getElementById('tree-root').innerHTML = renderNodeTree(rootNodeTree);
        document.getElementById('total-steps').innerText = stepHistory.length;

        setTimeout(drawLinesDOM, 100);
        window.addEventListener('resize', drawLinesDOM);

        document.getElementById('btn-next').addEventListener('click', () => {
            if (currentIndex < stepHistory.length - 1) {
                currentIndex++;
                applyState(currentIndex);
            }
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            if (currentIndex >= 0) {
                currentIndex--;
                applyState(currentIndex);
            }
        });
    </script>
</body>
</html>
