# Configuração do Alembic (migrações de banco).
# A URL do banco NÃO fica aqui — é lida em runtime pelo migrations/env.py a
# partir da variável de ambiente DATABASE_URL (assim não versionamos segredo).

[alembic]
script_location = migrations
prepend_sys_path = .
# Fuso para o nome dos arquivos de versão (timestamp legível, opcional).
# timezone =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
